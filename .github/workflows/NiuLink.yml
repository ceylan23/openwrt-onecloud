#
# 专为玩客云 (OneCloud) + NiuLink PCDN 定制的 OpenWrt 编译脚本
# 修复了打包阶段 .gz 文件找不到导致的 Error Code 1 问题
#

name: Build OneCloud OpenWrt for PCDN

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v24.10.5
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
                                gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
                                python3-setuptools rsync swig unzip zlib1g-dev file wget
        sudo apt-get autoremove --purge
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Use GitHub mirrors for feeds
      run: |
        cd openwrt
        sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/feed\/telephony.git/github.com\/openwrt\/telephony.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/feed\/routing.git/github.com\/openwrt\/routing.git/g' feeds.conf.default

    - name: Update and Install feeds
      run: |
        cd openwrt 
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 设置默认 IP 为 192.168.2.1
        sed -i 's/192.168.1.1/192.168.2.1/g' package/base-files/files/bin/config_generate
        sed -i 's/ dnsmasq / /g' include/target.mk
        
        # 定义根文件系统大小 (400M 足够 PCDN 跑业务了)
        cat <<EOF > .config
        CONFIG_TARGET_meson=y
        CONFIG_TARGET_meson_meson8b=y
        CONFIG_TARGET_meson_meson8b_DEVICE_thunder-onecloud=y
        CONFIG_TARGET_ROOTFS_PARTSIZE=400
        EOF

    - name: Inject NiuLink PCDN Drivers & Components
      run: |
        cd openwrt
        
        # ==================== NiuLink PCDN 核心依赖区 ====================
        
        # 1. 解决 iptables cgroup 缺失的核心模块 (最关键！)
        echo "CONFIG_PACKAGE_iptables-mod-extra=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-extra=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-cgroup=y" >> .config
        echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
        echo "CONFIG_PACKAGE_kmod-sched-cgroup=y" >> .config
        
        # 2. NiuLink 上机脚本必须的指令依赖包
        echo "CONFIG_PACKAGE_bash=y" >> .config
        echo "CONFIG_PACKAGE_qrencode=y" >> .config
        echo "CONFIG_PACKAGE_nmap=y" >> .config
        echo "CONFIG_PACKAGE_coreutils=y" >> .config
        echo "CONFIG_PACKAGE_coreutils-stat=y" >> .config

        # 3. 解决外接大硬盘识别与 ext4 挂载问题
        echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-storage-extras=y" >> .config
        echo "CONFIG_PACKAGE_kmod-fs-ext4=y" >> .config
        echo "CONFIG_PACKAGE_block-mount=y" >> .config
        echo "CONFIG_PACKAGE_e2fsprogs=y" >> .config
        
        # 4. 基础网络优化 (UPnP 与 BBR)
        echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
        echo "CONFIG_PACKAGE_kmod-tcp-bbr=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-watchcat=y" >> .config

        # ================================================================
        
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 抓取设备名用于命名
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Generate direct burn image (Fixed Version)
      if: steps.compile.outputs.status == 'success'
      run: |
          sudo apt install -y android-sdk-libsparse-utils
          ver="v0.3.1"
          curl -L -o ./AmlImg https://github.com/lxiaya/AmlImg/releases/download/$ver/AmlImg_${ver}_linux_amd64
          chmod +x ./AmlImg
          curl -L -o ./uboot.img https://github.com/lxiaya/u-boot-onecloud/releases/download/build-20230901-0443/eMMC.burn.img
          ./AmlImg unpack ./uboot.img burn/
          
          echo "================ 检查编译产物 ================"
          ls -lhR openwrt/bin/targets/
          echo "=============================================="
          
          # 智能解压逻辑：如果存在 .gz 则解压，否则跳过，防止报错中断
          if ls openwrt/bin/targets/*/*/*.gz 1> /dev/null 2>&1; then
              echo "发现 .gz 压缩包，正在解压..."
              gunzip openwrt/bin/targets/*/*/*.gz
          else
              echo "未发现 .gz 文件，直接使用生成的 .img 文件。"
          fi
          
          # 获取生成的 img 文件路径
          diskimg=$(ls openwrt/bin/targets/*/*/*.img | head -n 1)
          
          if [ -z "$diskimg" ]; then
              echo "致命错误：没有找到任何 .img 固件文件！"
              exit 1
          fi
          
          echo "找到固件：$diskimg，准备制作线刷包..."
          
          loop=$(sudo losetup --find --show --partscan $diskimg)
          
          # 清理原脚本中可能引发问题的变量
          boot_img="openwrt.img"
          boot_img_mnt="xd"
          rootfs_img_mnt="img"
          
          sudo rm -rf ${boot_img} ${boot_img_mnt} ${rootfs_img_mnt}
          sudo dd if=/dev/zero of=${boot_img} bs=1M count=400
          sudo mkfs.ext4 ${boot_img}
          
          sudo mkdir -p ${boot_img_mnt} ${rootfs_img_mnt}
          sudo mount ${boot_img} ${boot_img_mnt}
          sudo mount ${loop}p2 ${rootfs_img_mnt}
          
          cd ${rootfs_img_mnt}
          sudo cp -a * ../${boot_img_mnt}/
          cd ..
          sudo sync
          sudo umount ${boot_img_mnt} ${rootfs_img_mnt}
          
          sudo img2simg ${loop}p1 burn/boot.simg
          sudo img2simg openwrt.img burn/rootfs.simg
          sudo rm -rf *.img
          sudo losetup -d $loop
          
          cat <<EOF >>burn/commands.txt
          PARTITION:boot:sparse:boot.simg
          PARTITION:rootfs:sparse:rootfs.simg
          EOF
          
          prefix=$(ls openwrt/bin/targets/*/*/*.img | head -n 1 | sed 's/\.img$//')
          burnimg=${prefix}.burn.img
          ./AmlImg pack $burnimg burn/
          
          for f in openwrt/bin/targets/*/*/*.burn.img; do
            xz -9 --threads=0 --compress "$f"
          done

    - name: Organize firmware files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory to Artifact
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_NiuLink_OneCloud${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*.burn.img.xz

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "玩客云 (OneCloud) NiuLink PCDN 专属直刷固件" >> release.txt
        echo "包含: iptables-cgroup 核心模块，ext4 大容量挂载驱动" >> release.txt
        echo "优化: 剔除了无效的高负载插件，专注于 PCDN 跑量" >> release.txt
        echo "默认管理 IP: 192.168.2.1" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Releases
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*.burn.img.xz
