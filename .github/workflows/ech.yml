# Description: Build OneCloud OpenWrt for NiuLink PCDN (Ultimate v3.0 - Full Cgroup & Docker Ready)
#

name: Build OneCloud NiuLink-PCDN-Ultimate-v3.0

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v24.10.5
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: op1.sh
  DIY_P2_SH: op2.sh
  DIY_P3_SH: op3.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_PACKAGES: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
                                gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
                                python3-setuptools rsync swig unzip zlib1g-dev file wget
        sudo apt-get autoremove --purge
        sudo apt-get clean
        sudo timedatectl set-timezone 'Asia/Shanghai'
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load onecloud
      run: |
        [ -e target ] && cp -rf target openwrt/

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Use GitHub mirrors for feeds
      run: |
        cd openwrt
        sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/feed\/telephony.git/github.com\/openwrt\/telephony.git/g' feeds.conf.default
        sed -i 's/git.openwrt.org\/feed\/routing.git/github.com\/openwrt\/routing.git/g' feeds.conf.default

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Remove some feeds
      run: |
        chmod +x $DIY_P3_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P3_SH

    - name: Second update feed
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Clone custom plugins
      run: |
        cd openwrt
        mkdir -p package/my
        git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git package/my/luci-theme-argon

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        sed -i 's/192.168.1.1/192.168.2.1/g' package/base-files/files/bin/config_generate
        sed -i 's/ dnsmasq / /g' include/target.mk
        sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=512/g' .config

    - name: Download package and Inject Ultimate Drivers v3.0
      id: package
      run: |
        cd openwrt
        make defconfig
        
        # ==================== 补全 NiuLink 核心依赖与 Docker/Cgroup 环境 ====================
        
        # 0. 修复日志中的 Cgroup 缺失和 Docker 报错 (终极修复)
        echo "CONFIG_KERNEL_CGROUP_SCHED=y" >> .config
        echo "CONFIG_KERNEL_CGROUPS=y" >> .config
        echo "CONFIG_PACKAGE_cgroupfs-mount=y" >> .config
        echo "CONFIG_PACKAGE_kmod-cgroup=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ikconfig=y" >> .config
        echo "CONFIG_PACKAGE_kmod-macvlan=y" >> .config
        echo "CONFIG_PACKAGE_kmod-dummy=y" >> .config
        echo "CONFIG_PACKAGE_apparmor=y" >> .config
        echo "CONFIG_PACKAGE_docker=y" >> .config
        echo "CONFIG_PACKAGE_dockerd=y" >> .config
        echo "CONFIG_PACKAGE_docker-compose=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
        
        # 1. 网页终端
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        
        # 2. 解决 iptables 找不到的问题 (包含老版本兼容命令)
        echo "CONFIG_PACKAGE_iptables=y" >> .config
        echo "CONFIG_PACKAGE_iptables-zz-legacy=y" >> .config
        echo "CONFIG_PACKAGE_iptables-mod-extra=y" >> .config
        echo "CONFIG_PACKAGE_iptables-mod-conntrack-extra=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-extra=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-cgroup=y" >> .config
        
        # 3. 补全 JSON 处理工具 (脚本死穴)
        echo "CONFIG_PACKAGE_jq=y" >> .config
        
        # 4. 补全下载与网络命令
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
        echo "CONFIG_PACKAGE_ca-certificates=y" >> .config
        echo "CONFIG_PACKAGE_ip-full=y" >> .config
        echo "CONFIG_PACKAGE_ppp=y" >> .config # 根据报错补充
        
        # 5. 补全脚本所需的底层命令
        echo "CONFIG_PACKAGE_bash=y" >> .config
        echo "CONFIG_PACKAGE_coreutils=y" >> .config
        echo "CONFIG_PACKAGE_coreutils-stat=y" >> .config
        echo "CONFIG_PACKAGE_coreutils-tty=y" >> .config
        echo "CONFIG_PACKAGE_coreutils-nohup=y" >> .config
        echo "CONFIG_PACKAGE_chattr=y" >> .config
        echo "CONFIG_PACKAGE_lsblk=y" >> .config
        echo "CONFIG_PACKAGE_fdisk=y" >> .config
        echo "CONFIG_PACKAGE_qrencode=y" >> .config
        echo "CONFIG_PACKAGE_nmap=y" >> .config
        
        # 6. 基础增强与主题
        echo "CONFIG_PACKAGE_luci-app-watchcat=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
        echo "CONFIG_PACKAGE_kmod-tcp-bbr=y" >> .config
        echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config

        # ==============================================================================
        
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Generate direct burn
      if: steps.compile.outputs.status == 'success'
      run: |
          sudo apt install android-sdk-libsparse-utils
          ver="v0.3.1"
          curl -L -o ./AmlImg https://github.com/lxiaya/AmlImg/releases/download/$ver/AmlImg_${ver}_linux_amd64
          chmod +x ./AmlImg
          curl -L -o ./uboot.img https://github.com/lxiaya/u-boot-onecloud/releases/download/build-20230901-0443/eMMC.burn.img
          ./AmlImg unpack ./uboot.img burn/
          gunzip openwrt/bin/targets/*/*/*.gz
          diskimg=$(ls openwrt/bin/targets/*/*/*.img | head -n 1)
          loop=$(sudo losetup --find --show --partscan $diskimg)
          sudo dd if=/dev/zero of=openwrt.img bs=1M count=512
          sudo mkfs.ext4 openwrt.img
          sudo mkdir -p xd img
          sudo mount openwrt.img xd
          sudo mount ${loop}p2 img
          sudo cp -rf img/* xd/
          sudo sync
          sudo umount xd img
          sudo img2simg ${loop}p1 burn/boot.simg
          sudo img2simg openwrt.img burn/rootfs.simg
          sudo losetup -d $loop
          cat <<EOF >>burn/commands.txt
          PARTITION:boot:sparse:boot.simg
          PARTITION:rootfs:sparse:rootfs.simg
          EOF
          prefix=$(ls openwrt/bin/targets/*/*/*.img | head -n 1 | sed 's/\.img$//')
          ./AmlImg pack ${prefix}.burn.img burn/
          xz -9 --threads=0 ${prefix}.burn.img

    - name: Organize firmware files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory to Artifact
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_NiuLink_V3.0_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*.xz

    - name: Upload firmware to Releases
      uses: softprops/action-gh-release@master
      if: steps.compile.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: NiuLink-v3.0-${{ env.FILE_DATE }}
        files: ${{ env.FIRMWARE }}/*.xz

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      if: steps.compile.outputs.status == 'success'
      with:
        retain_days: 1
        keep_minimum_runs: 3
